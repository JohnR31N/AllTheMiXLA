dataset: tiny_imagenet
data_dir: ./data
model: preact_resnet18
method: resizemix
cross_device_shuffle: true

# XLA batch_size is per device. With 4 TPU devices this keeps global batch 128.
batch_size: 32
global_batch_size: 128
epochs: 200
max_train_steps: -1
max_eval_steps: -1

validation_split: 0.1
eval_on_test_each_epoch: false
final_test: true
final_test_checkpoint: best

learning_rate: 0.1
momentum: 0.9
weight_decay: 0.0005
lr_schedule: step
min_learning_rate: 0.0
lr_decay_epochs: [150, 180]
lr_decay_rate: 0.1

resizemix_scope_min: 0.1
resizemix_scope_max: 0.4
resizemix_use_alpha: false
resizemix_prob: 1.0
resizemix_no_repeat: false

basic_aug: false
aug_recipe: tiny_openmixup
seed: 0

save_csv: true
run_metadata_required: true
output_dir: ./outputs
output_name: ""
run_name: tiny_imagenet_preact_resnet18_resizemix_xla4

save_checkpoint: true
checkpoint_dir: ./checkpoints
save_best_only: true
resume_checkpoint: ""

distributed: true
log_time: true
