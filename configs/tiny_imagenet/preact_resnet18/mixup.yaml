dataset: tinyimagenet
recipe: openmixup
model: preact_resnet18
method: mixup
data_dir: ./data
output_dir: ./runs/mixup
download: false
use_basic_augmentation: true

training:
  epochs: 400
  batch_size: 100
  lr: 0.2
  momentum: 0.9
  weight_decay: 0.0001
  scheduler: cosine
  milestones: []

mixup:
  alpha: 1.0
  prob: 1.0
